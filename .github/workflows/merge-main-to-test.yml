name: "* Merge main to test"

on:
  push:
    branches:
      - master

jobs:
  merge_back_to_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Merge master -> test
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: master
          target_branch: test
          github_token: ${{ secrets.GITHUB_TOKEN }}
